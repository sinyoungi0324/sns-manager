<!DOCTYPE html><!-- SNS Manager v2.5 -->
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SNS Manager"/>
<meta name="theme-color" content="#F4A7B9"/>
<title>SNS Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#F4A7B9;--red-text:#fff; --bg:#F2F2F7; --surface:#FFFFFF; --border:#E5E5EA;
  --text:#1C1C1E; --text2:#636366; --text3:#AEAEB2;
  --twitter:#1DA1F2; --instagram:#E1306C; --youtube:#FF0000;
  --tiktok-a:#69C9D0; --tiktok-b:#EE1D52; --weverse:#6B4FBB; --weibo:#DF2029;
  --radius:14px; --radius-sm:10px;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,34px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text)}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--red);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s ease}
#splash.hide{opacity:0;pointer-events:none}
.splash-circle{width:100px;height:100px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(0,0,0,0.25);margin-bottom:28px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) .1s both}
.splash-circle span{font-size:46px}
#splash h1{color:white;font-size:30px;font-weight:900;letter-spacing:-1px;animation:fadeUp .5s ease .3s both}
#splash p{color:rgba(255,255,255,.65);font-size:13px;margin-top:6px;animation:fadeUp .5s ease .4s both}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--red);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;padding:40px 32px}
#lock.show{display:flex}
#lock h2{color:white;font-size:22px;font-weight:700;margin-bottom:6px}
#lock .lock-sub{color:rgba(255,255,255,.65);font-size:13px;margin-bottom:40px;text-align:center}
.pin-dots{display:flex;gap:18px;margin-bottom:36px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);transition:all .15s}
.pin-dot.filled{background:white;border-color:white;transform:scale(1.1)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:260px}
.num-btn{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:70px;height:70px;margin:auto;font-size:22px;font-weight:600;color:white;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center;font-family:inherit}
.num-btn:active{background:rgba(255,255,255,.3);transform:scale(.93)}
.num-btn.del{font-size:18px}
.lock-err{color:rgba(255,255,255,.9);font-size:13px;margin-top:16px;min-height:20px;font-weight:600}

/* APP SHELL */
#app{position:fixed;inset:0;display:none;flex-direction:column}
#app.show{display:flex}
.statusbar{height:var(--safe-top);background:var(--surface);flex-shrink:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.topbar-btn{background:var(--red);color:white;border:none;border-radius:22px;padding:8px 18px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:-.2px}
.page-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 80px)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;cursor:pointer;transition:all .15s;border:none;background:transparent;font-family:inherit;gap:3px}
.nav-item .nav-icon{font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:12px;transition:all .2s}
.nav-item .nav-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:-.2px}
.nav-item.active .nav-label{color:var(--red);font-weight:700}
.nav-item.active .nav-icon{background:var(--red)15;color:var(--red)}

/* PAGES */
.page{display:none;padding:16px 16px 0}
.page.active{display:block}

/* DATE HEADER */
.date-hdr{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:8px 0 10px;display:flex;align-items:center;gap:8px}
.today-badge{background:var(--red);color:white;font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:.3px}

/* SCHEDULE CARD */
.sched-card{background:var(--surface);border-radius:var(--radius);padding:14px 14px 12px;margin-bottom:8px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04)}
.sched-card.done-card{opacity:.55}
.sched-card .card-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:14px 0 0 14px}
.card-inner{padding-left:10px}
.card-top{display:flex;align-items:flex-start;gap:10px}
.card-time{font-size:13px;font-weight:700;color:var(--text);min-width:44px;flex-shrink:0;margin-top:1px}
.card-info{flex:1}
.card-title{font-size:15px;font-weight:600;margin-bottom:5px;line-height:1.3}
.card-title.done-text{text-decoration:line-through;color:var(--text3)}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.card-check{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;font-size:13px}
.card-check.checked{background:#30D158;border-color:#30D158;color:white}

/* SUB SCHEDULE */
.sub-cards{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.sub-card{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg)}
.sub-card:last-child{border-bottom:none;padding-bottom:0}
.sub-indent{color:var(--text3);font-size:14px;flex-shrink:0;margin-top:1px}
.sub-time{font-size:12px;font-weight:600;color:var(--text2);min-width:38px;flex-shrink:0;margin-top:1px}
.sub-title{font-size:13px;font-weight:500;flex:1;line-height:1.3}
.sub-title.done-text{text-decoration:line-through;color:var(--text3)}
.sub-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;font-size:11px}
.sub-check.checked{background:#30D158;border-color:#30D158;color:white}
.add-sub-btn{display:flex;align-items:center;gap:6px;padding:8px 0 0;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;font-family:inherit}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:600}
.b-twitter{background:#E3F2FD;color:var(--twitter)}
.b-instagram{background:#FCE4EC;color:var(--instagram)}
.b-youtube{background:#FFEBEE;color:var(--youtube)}
.b-tiktok{background:linear-gradient(135deg,#E0F7FA,#FCE4EC);color:#333}
.b-weverse{background:#EDE7F6;color:var(--weverse)}
.b-weibo{background:#FFEBEE;color:var(--weibo)}
.b-keyword{background:#EDE7F6;color:#5E35B1}
.b-type{background:#FFF3E0;color:#E65100}
.b-done{background:#E8F5E9;color:#2E7D32}
.b-pending{background:#FFF9C4;color:#F57F17}
.b-nofile{background:#FFF3E0;color:#E65100}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:var(--text3);text-align:center}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty p{font-size:14px}

/* SECTION TITLE */
.section-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;margin-top:6px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;height:92vh;overflow-y:auto;padding-bottom:calc(var(--safe-bottom) + 16px);animation:slideUp .3s cubic-bezier(.34,1.1,.64,1);-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:100px;margin:12px auto 8px}
.modal-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;box-shadow:0 1px 0 var(--border)}
.modal-header h3{font-size:17px;font-weight:700}
.modal-close{background:var(--bg);border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text2)}
.modal-body{padding:16px 20px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.2px}
.form-input,.form-select,.form-textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--red)}
.form-textarea{resize:none;min-height:120px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.btn-main{flex:1;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-sec{flex:1;background:var(--bg);color:var(--text2);border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}

/* PLATFORM PILLS */
.platform-row{display:flex;flex-wrap:wrap;gap:8px}
.plat-pill{padding:8px 14px;border-radius:100px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.plat-pill.sel-twitter{border-color:var(--twitter);background:#E3F2FD;color:var(--twitter)}
.plat-pill.sel-instagram{border-color:var(--instagram);background:#FCE4EC;color:var(--instagram)}
.plat-pill.sel-youtube{border-color:var(--youtube);background:#FFEBEE;color:var(--youtube)}
.plat-pill.sel-tiktok{border-color:#EE1D52;background:linear-gradient(135deg,#E0F7FA,#FCE4EC);color:#333}
.plat-pill.sel-weverse{border-color:var(--weverse);background:#EDE7F6;color:var(--weverse)}
.plat-pill.sel-weibo{border-color:var(--weibo);background:#FFEBEE;color:var(--weibo)}

/* KEYWORD GROUPS */
.kw-group{margin-bottom:8px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.kw-group-hdr{padding:10px 14px;background:var(--text);color:white;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.kw-subs{background:var(--surface)}
.kw-sub-item{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--bg);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.kw-sub-item:last-child{border-bottom:none}
.kw-sub-item.selected{background:#EDE7F6;color:#5E35B1;font-weight:600}
.kw-sub-item:active{background:var(--bg)}

/* CHECKLIST */
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:6px}
.check-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--red);flex-shrink:0}
.check-item span{font-size:13px;flex:1}
.check-item.checked span{text-decoration:line-through;color:var(--text3)}
.check-item .del-check{color:var(--text3);font-size:16px;cursor:pointer;padding:2px 4px}

/* DETAIL PAGE */
.detail-header{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.detail-section{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.caption-box{background:var(--bg);border-radius:var(--radius-sm);padding:14px;font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word;cursor:text;user-select:text;position:relative}
.copy-btn{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:600;color:var(--text2);font-family:inherit;cursor:pointer;margin-top:8px;transition:all .15s}
.copy-btn.copied{background:#E8F5E9;border-color:#30D158;color:#2E7D32}
.example-box{background:#EDE7F6;border-radius:var(--radius-sm);padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;color:#4527A0;cursor:text;user-select:text;border-left:3px solid var(--weverse)}

/* TEMPLATE PAGE */
.tpl-group{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.tpl-group-hdr{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.tpl-group-hdr h4{font-size:15px;font-weight:700}
.tpl-group-hdr .tpl-hdr-right{display:flex;align-items:center;gap:8px}
.tpl-sub{padding:12px 16px;border-top:1px solid var(--bg);display:flex;justify-content:space-between;align-items:center}
.tpl-sub-name{font-size:14px;font-weight:500}
.tpl-actions{display:flex;gap:8px}
.tpl-btn{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.tpl-btn-edit{background:var(--bg);color:var(--text2)}
.tpl-btn-del{background:#FFEBEE;color:var(--youtube)}
.tpl-add-sub{padding:12px 16px;border-top:1px solid var(--bg);color:var(--red);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}

/* ARTIST PAGE */
.artist-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
.artist-emoji-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.artist-info{flex:1}
.artist-name{font-size:15px;font-weight:600}
.artist-color-swatch{width:16px;height:16px;border-radius:4px;display:inline-block;margin-left:6px;vertical-align:middle}

/* SEARCH */
.search-bar{background:var(--bg);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.search-bar input{border:none;background:transparent;font-size:14px;font-family:inherit;color:var(--text);flex:1;outline:none}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-bottom) + 80px);left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;z-index:9000;white-space:nowrap;animation:fadeUp .2s ease;pointer-events:none}

/* ANIMATIONS */
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* TABS */
.tabs{display:flex;background:var(--bg);border-radius:var(--radius-sm);padding:3px;margin-bottom:16px}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* DANGER BTN */
.btn-danger{background:#FFEBEE;color:var(--youtube);border:none;border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;width:100%}
.confirm-row{display:flex;gap:8px;margin-top:10px}

/* NOTIFICATION PERMISSION */
.notif-banner{background:linear-gradient(135deg,#FFF8F0,#FFF3E0);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;border:1px solid #FFE0B2}
.notif-banner button{background:var(--red);color:white;border:none;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-circle"><span>📱</span></div>
  <h1>SNS Manager</h1>
  <p>엔터테인먼트 운영 툴</p>
</div>

<!-- LOCK -->
<div id="lock">
  <h2>🔒 잠금 해제</h2>
  <p class="lock-sub">4자리 PIN을 입력해주세요</p>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="num-btn" onclick="pinInput('1')">1</button>
    <button class="num-btn" onclick="pinInput('2')">2</button>
    <button class="num-btn" onclick="pinInput('3')">3</button>
    <button class="num-btn" onclick="pinInput('4')">4</button>
    <button class="num-btn" onclick="pinInput('5')">5</button>
    <button class="num-btn" onclick="pinInput('6')">6</button>
    <button class="num-btn" onclick="pinInput('7')">7</button>
    <button class="num-btn" onclick="pinInput('8')">8</button>
    <button class="num-btn" onclick="pinInput('9')">9</button>
    <button class="num-btn" style="opacity:0;pointer-events:none"></button>
    <button class="num-btn" onclick="pinInput('0')">0</button>
    <button class="num-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="lock-err" id="lockErr"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="statusbar"></div>
  <div class="topbar">
    <span class="topbar-title" id="pageTitle">오늘</span>
    <button class="topbar-btn" id="topbarBtn" onclick="openAddModal()">+ 추가</button>
  </div>
  <div class="page-wrap">

    <!-- 대시보드 -->
    <div class="page active" id="page-dashboard">
      <div id="notifBanner" class="notif-banner" style="display:none">
        <span>🔔 알림을 허용해야 스케줄 알림이 울려요</span>
        <button onclick="requestNotif()">허용</button>
      </div>
      <div id="dashContent"></div>
    </div>

    <!-- 전체 스케줄 -->
    <div class="page" id="page-schedules">
      <div class="search-bar">
        <span>🔍</span>
        <input id="schedSearch" placeholder="제목 검색" oninput="renderSchedules()"/>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="setSchedTab('upcoming',this)">예정</button>
        <button class="tab" onclick="setSchedTab('done',this)">완료</button>
        <button class="tab" onclick="setSchedTab('all',this)">전체</button>
      </div>
      <div id="schedContent"></div>
    </div>

    <!-- 스케줄 상세 -->
    <div class="page" id="page-detail">
      <div id="detailContent"></div>
    </div>

    <!-- 키워드 템플릿 -->
    <div class="page" id="page-templates">
      <div class="search-bar">
        <span>🔍</span>
        <input id="tplSearch" placeholder="키워드 또는 항목 검색" oninput="renderTemplates()"/>
      </div>
      <div id="tplContent"></div>
    </div>

    <!-- 아티스트 -->
    <div class="page" id="page-artists">
      <div id="artistContent"></div>
    </div>

    <!-- 설정 -->
    <div class="page" id="page-settings">
      <div class="detail-section">
        <div class="detail-section-title">PIN 변경</div>
        <div class="form-group">
          <label class="form-label">현재 PIN</label>
          <input class="form-input" id="currentPin" type="password" maxlength="4" placeholder="현재 4자리 PIN" inputmode="numeric"/>
        </div>
        <div class="form-group">
          <label class="form-label">새 PIN (4자리)</label>
          <input class="form-input" id="newPin" type="password" maxlength="4" placeholder="새 4자리 숫자" inputmode="numeric"/>

<script>
// ── 상수 ──────────────────────────────────────────────────
const PLATFORMS = ['트위터','인스타그램','유튜브','틱톡','베리즈','웨이보'];
const PLATKEY = p=>({트위터:'twitter',인스타그램:'instagram',유튜브:'youtube',틱톡:'tiktok',베리즈:'weverse',웨이보:'weibo'}[p]||'twitter');
const PLATEMOJI = p=>({트위터:'🐦',인스타그램:'📸',유튜브:'▶',틱톡:'♪',베리즈:'💜',웨이보:'🌐'}[p]||'🔗');
const COLORS=['#FF2D55','#FF6600','#FFD600','#34C759','#007AFF','#5856D6','#8B00FF','#FF6B9D','#7B68EE','#20B2AA','#FF8C42'];
const EMOJIS=['🌸','💜','🌿','🔶','⭐','🎯','🎵','✨','🦋','🎤','💎','🌙'];
const DEFAULT_PIN='1234';
const NOTIF_TIMES=[-10,-5,0]; // minutes before

// ── 상태 ──────────────────────────────────────────────────
let state={
  schedules: JSON.parse(localStorage.getItem('m_schedules')||'[]'),
  templates: JSON.parse(localStorage.getItem('m_templates')||'[]'),
  artists: JSON.parse(localStorage.getItem('m_artists')||JSON.stringify([
    {id:'a1',name:'아티스트 1',color:'#FF2D55',emoji:'🌸'},
    {id:'a2',name:'아티스트 2',color:'#5856D6',emoji:'💜'},
    {id:'a3',name:'아티스트 3',color:'#34C759',emoji:'🌿'},
    {id:'a4',name:'아티스트 4',color:'#FF6600',emoji:'🔶'},
  ])),
  pin: localStorage.getItem('m_pin')||DEFAULT_PIN,
  currentPage:'dashboard',
  detailId: null,
  editId: null,
  subEditId: null,
  subParentId: null,
  schedTab:'upcoming',
  tplEditGroup: null,
  tplEditSub: null,
  artistEdit: null,
  selectedPlatforms:[],
  selectedStatus:'pending',
  checklist:[],
  expandedKwGroups:{},
  notifTimers:{},
};

function save(){
  localStorage.setItem('m_schedules',JSON.stringify(state.schedules));
  localStorage.setItem('m_templates',JSON.stringify(state.templates));
  localStorage.setItem('m_artists',JSON.stringify(state.artists));
  localStorage.setItem('m_pin',state.pin);
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

// ── PIN ───────────────────────────────────────────────────
let pinBuffer='';
function pinInput(v){
  if(v==='*'){showPinSettings();return;}
  if(pinBuffer.length>=4)return;
  pinBuffer+=v;
  updatePinDots();
  if(pinBuffer.length===4)setTimeout(checkPin,100);
}
function pinDel(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();}
function updatePinDots(){
  for(let i=0;i<4;i++)document.getElementById('d'+i).className='pin-dot'+(i<pinBuffer.length?' filled':'');
}
function checkPin(){
  if(pinBuffer===state.pin){
    document.getElementById('lock').classList.remove('show');
    showApp();
  } else {
    document.getElementById('lockErr').textContent='❌ 잘못된 PIN입니다';
    pinBuffer='';updatePinDots();
    setTimeout(()=>document.getElementById('lockErr').textContent='',1500);
  }
}
function showPinSettings(){}
function savePin(){
  const cur=document.getElementById('currentPin').value.trim();
  const v=document.getElementById('newPin').value.trim();
  const vc=document.getElementById('newPinConfirm').value.trim();
  if(cur!==state.pin){showToast('❌ 현재 PIN이 틀렸어요');document.getElementById('currentPin').value='';return;}
  if(v.length!==4||!/^\d{4}$/.test(v)){showToast('새 PIN은 4자리 숫자여야 해요');return;}
  if(v!==vc){showToast('❌ 새 PIN이 일치하지 않아요');document.getElementById('newPinConfirm').value='';return;}
  state.pin=v;save();
  document.getElementById('currentPin').value='';
  document.getElementById('newPin').value='';
  document.getElementById('newPinConfirm').value='';
  showToast('✅ PIN이 변경되었습니다');
}

// ── 앱 시작 ───────────────────────────────────────────────
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>{
      document.getElementById('splash').style.display='none';
      document.getElementById('lock').classList.add('show');
    },600);
  },1800);
});

function showApp(){
  document.getElementById('app').classList.add('show');
  renderDashboard();
  renderSchedules();
  renderTemplates();
  renderArtists();
  scheduleAllNotifications();
  checkNotifPermission();
}

// ── 알림 ──────────────────────────────────────────────────
function checkNotifPermission(){
  if(Notification.permission==='default'){
    document.getElementById('notifBanner').style.display='flex';
  }
}
function requestNotif(){
  Notification.requestPermission().then(p=>{
    if(p==='granted'){
      document.getElementById('notifBanner').style.display='none';
      showToast('🔔 알림이 허용되었습니다');
      scheduleAllNotifications();
    }
  });
}

function scheduleAllNotifications(){
  Object.values(state.notifTimers).forEach(t=>clearTimeout(t));
  state.notifTimers={};
  state.schedules.forEach(s=>{
    scheduleNotif(s);
    (s.subs||[]).forEach(sub=>scheduleNotif(sub,s));
  });
}

function scheduleNotif(s,parent=null){
  if(!s.time||!s.date)return;
  const [y,mo,d]=s.date.split('-').map(Number);
  const [h,mi]=s.time.split(':').map(Number);
  const base=new Date(y,mo-1,d,h,mi,0,0).getTime();
  const title=parent?`[${parent.title}] ${s.title}`:s.title;

  NOTIF_TIMES.forEach(offset=>{
    const fireAt=base+offset*60000;
    const ms=fireAt-Date.now();
    if(ms>0){
      const tid=setTimeout(()=>{
        if(Notification.permission==='granted'){
          const label=offset===-10?'10분 전':offset===-5?'5분 전':'지금!';
          new Notification(`⏰ ${label}`,{body:title,tag:s.id+offset});
        }
      },ms);
      state.notifTimers[s.id+'_'+offset]=tid;
    }
  });
}

// ── 페이지 이동 ───────────────────────────────────────────
function goPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  state.currentPage=name;

  const titles={dashboard:'오늘',schedules:'전체 스케줄',detail:'스케줄 상세',templates:'키워드 템플릿',artists:'아티스트 관리',settings:'설정'};
  document.getElementById('pageTitle').textContent=titles[name]||name;
  const showAdd=['dashboard','schedules'].includes(name);
  document.getElementById('topbarBtn').style.display=showAdd?'':'none';

  if(name==='dashboard')renderDashboard();
  if(name==='schedules')renderSchedules();
  if(name==='templates')renderTemplates();
  if(name==='artists')renderArtists();
}

function goDetail(id){
  state.detailId=id;
  renderDetail();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('nav-schedules').classList.add('active');
  document.getElementById('pageTitle').textContent='스케줄 상세';
  document.getElementById('topbarBtn').style.display='none';
  state.currentPage='detail';
}

// ── 날짜 포맷 ─────────────────────────────────────────────
function isToday(d){const t=new Date();return d===`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`}
function fmtDate(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${y}.${m}.${dd}`}
function fmtTime(t){return t||'종일'}

// ── 플랫폼 뱃지 ───────────────────────────────────────────
function platBadge(p){return`<span class="badge b-${PLATKEY(p)}">${PLATEMOJI(p)} ${p}</span>`}

// ── 스케줄 카드 HTML ──────────────────────────────────────
function schedCardHTML(s,showDate=false){
  const artist=state.artists.find(a=>a.id===s.artistId);
  const accentColor=artist?artist.color:'#E5E5EA';
  const isDone=s.status==='done';

  // 하위 스케줄 HTML
  let subHTML='';
  if((s.subs||[]).length>0){
    subHTML=`<div class="sub-cards">`;
    s.subs.sort((a,b)=>(a.time||'99:99')>(b.time||'99:99')?1:-1).forEach(sub=>{
      const subDone=sub.status==='done';
      subHTML+=`
        <div class="sub-card">
          <span class="sub-indent">└</span>
          <span class="sub-time">${fmtTime(sub.time)}</span>
          <span class="sub-title${subDone?' done-text':''}" style="flex:1">${sub.title}</span>
          <div class="sub-check${subDone?' checked':''}" onclick="toggleSubDone('${s.id}','${sub.id}',event)">
            ${subDone?'✓':''}
          </div>
        </div>`;
    });
    subHTML+=`<button class="add-sub-btn" onclick="openSubModal('${s.id}',null,event)">+ 하위 스케줄 추가</button>`;
    subHTML+=`</div>`;
  } else {
    subHTML=`<button class="add-sub-btn" onclick="openSubModal('${s.id}',null,event)" style="padding-top:8px;border-top:1px solid var(--border);margin-top:8px">+ 하위 스케줄 추가</button>`;
  }

  const noFile=!s.files||s.files.length===0;
  return`
    <div class="sched-card${isDone?' done-card':''}" onclick="goDetail('${s.id}')">
      <div class="card-accent" style="background:${accentColor}"></div>
      <div class="card-inner">
        <div class="card-top">
          <div>
            ${showDate&&!isToday(s.date)?`<div style="font-size:11px;color:var(--text3);margin-bottom:2px">${fmtDate(s.date)}</div>`:''}
            <div class="card-time">${fmtTime(s.time)}</div>
          </div>
          <div class="card-info">
            <div class="card-title${isDone?' done-text':''}">${s.title}</div>
            <div class="card-meta">
              ${s.keyword?`<span class="badge b-keyword">🏷 ${s.keyword}</span>`:''}
              ${artist?`<span class="badge" style="background:${artist.color}20;color:${artist.color}">${artist.emoji} ${artist.name}</span>`:''}
              ${(s.platforms||[]).map(p=>platBadge(p)).join('')}
              <span class="badge ${isDone?'b-done':'b-pending'}">${isDone?'✓ 완료':'예정'}</span>
              ${noFile&&!isDone?`<span class="badge b-nofile">⚠ 파일없음</span>`:''}
            </div>
          </div>
          <div class="card-check${isDone?' checked':''}" onclick="toggleDone('${s.id}',event)">
            ${isDone?'✓':''}
          </div>
        </div>
        ${subHTML}
      </div>
    </div>`;
}

// ── 대시보드 렌더 ─────────────────────────────────────────
function renderDashboard(){
  const today=new Date().toISOString().slice(0,10);
  const todayScheds=state.schedules.filter(s=>s.date===today)
    .sort((a,b)=>(a.time||'99:99')>(b.time||'99:99')?1:-1);
  const upcoming=state.schedules.filter(s=>{
    const diff=(new Date(s.date)-new Date())/86400000;
    return s.date!==today&&diff>=0&&diff<=7&&s.status==='pending';
  }).sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:(a.time||'99:99')>(b.time||'99:99')?1:-1);

  let html='';
  html+=`<div class="date-hdr">오늘 <span class="today-badge">TODAY</span></div>`;
  if(todayScheds.length===0){
    html+=`<div class="empty"><div class="empty-icon">🌿</div><p>오늘 예정된 스케줄이 없어요</p></div>`;
  } else {
    todayScheds.forEach(s=>html+=schedCardHTML(s));
  }
  if(upcoming.length>0){
    html+=`<div class="date-hdr" style="margin-top:20px">이번 주 예정</div>`;
    upcoming.slice(0,5).forEach(s=>html+=schedCardHTML(s,true));
  }
  document.getElementById('dashContent').innerHTML=html;
}

// ── 전체 스케줄 렌더 ──────────────────────────────────────
let schedTab='upcoming';
function setSchedTab(tab,btn){
  schedTab=tab;
  document.querySelectorAll('#page-schedules .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderSchedules();
}
function renderSchedules(){
  const q=(document.getElementById('schedSearch')?.value||'').toLowerCase();
  let list=state.schedules.filter(s=>{
    if(q&&!s.title.toLowerCase().includes(q)&&!(s.keyword||'').toLowerCase().includes(q))return false;
    if(schedTab==='upcoming')return s.status==='pending';
    if(schedTab==='done')return s.status==='done';
    return true;
  });
  // 날짜별 그룹
  const groups={};
  list.forEach(s=>{
    if(!groups[s.date])groups[s.date]=[];
    groups[s.date].push(s);
  });
  let html='';
  Object.entries(groups).sort(([a],[b])=>a>b?1:-1).forEach(([date,items])=>{
    html+=`<div class="date-hdr${isToday(date)?' today-hdr':''}">${isToday(date)?`오늘 <span class="today-badge">TODAY</span>`:fmtDate(date)} <span style="color:var(--text3);font-weight:400">(${items.length})</span></div>`;
    items.sort((a,b)=>(a.time||'99:99')>(b.time||'99:99')?1:-1).forEach(s=>html+=schedCardHTML(s,false));
  });
  if(!html)html=`<div class="empty"><div class="empty-icon">📭</div><p>스케줄이 없어요</p></div>`;
  document.getElementById('schedContent').innerHTML=html;
}

// ── 스케줄 상세 렌더 ──────────────────────────────────────
function renderDetail(){
  const s=state.schedules.find(x=>x.id===state.detailId);
  if(!s){document.getElementById('detailContent').innerHTML='<div class="empty"><p>스케줄을 찾을 수 없어요</p></div>';return;}
  const artist=state.artists.find(a=>a.id===s.artistId);
  const isDone=s.status==='done';
  const exNote=findExampleNote(s.keyword);

  const doneCount=(s.checklist||[]).filter(c=>c.done).length;
  const totalCount=(s.checklist||[]).length;

  let html=`
    <div class="detail-header" style="${artist?`border-left:4px solid ${artist.color};padding-left:20px`:''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <div style="font-size:20px;font-weight:700;margin-bottom:8px">${s.title}</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">
            ${s.keyword?`<span class="badge b-keyword">🏷 ${s.keyword}</span>`:''}
            ${artist?`<span class="badge" style="background:${artist.color}20;color:${artist.color}">${artist.emoji} ${artist.name}</span>`:''}
            ${(s.platforms||[]).map(p=>platBadge(p)).join('')}
            <span class="badge ${isDone?'b-done':'b-pending'}">${isDone?'✓ 완료':'📌 예정'}</span>
          </div>
          <div style="font-size:13px;color:var(--text2)">📅 ${fmtDate(s.date)}${s.time?' &nbsp;🕐 '+s.time:''}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button onclick="openEditModal('${s.id}')" style="flex:1;background:var(--bg);border:none;border-radius:var(--radius-sm);padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">✏️ 수정</button>
        <button onclick="toggleDone('${s.id}',event)" style="flex:2;background:${isDone?'var(--bg)':'var(--red)'};color:${isDone?'var(--text2)':'white'};border:none;border-radius:var(--radius-sm);padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">${isDone?'↩ 되돌리기':'✅ 완료 처리'}</button>
      </div>
    </div>`;

  // 하위 스케줄
  if((s.subs||[]).length>0||(s.subs||[]).length===0){
    html+=`<div class="detail-section">
      <div class="detail-section-title">📌 하위 스케줄</div>`;
    if((s.subs||[]).length===0){
      html+=`<div style="font-size:13px;color:var(--text3)">하위 스케줄이 없어요</div>`;
    } else {
      (s.subs||[]).sort((a,b)=>(a.time||'99:99')>(b.time||'99:99')?1:-1).forEach(sub=>{
        const subDone=sub.status==='done';
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg)">
          <div class="sub-check${subDone?' checked':''}" onclick="toggleSubDone('${s.id}','${sub.id}',event)">${subDone?'✓':''}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600${subDone?';text-decoration:line-through;color:var(--text3)':''}">${sub.time?sub.time+' — ':''}${sub.title}</div>
            ${sub.notes?`<div style="font-size:12px;color:var(--text3);margin-top:2px">${sub.notes}</div>`:''}
          </div>
          <button onclick="openSubModal('${s.id}','${sub.id}',event)" style="background:var(--bg);border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer">수정</button>
        </div>`;
      });
    }
    html+=`<button class="add-sub-btn" onclick="openSubModal('${s.id}',null,event)">+ 하위 스케줄 추가</button>
    </div>`;
  }

  // 멘트
  if(s.caption){
    html+=`<div class="detail-section">
      <div class="detail-section-title">📝 멘트 (캡션)</div>
      <div class="caption-box" id="captionBox">${s.caption}</div>
      <button class="copy-btn" id="copyBtn" onclick="copyCaption('${s.id}')">📋 전체 복사</button>
    </div>`;
  }

  // 참고 예시글
  if(exNote){
    html+=`<div class="detail-section">
      <div class="detail-section-title" style="color:#5E35B1">📝 참고 예시글</div>
      <div class="example-box">${exNote}</div>
    </div>`;
  }

  // 체크리스트
  if(totalCount>0){
    html+=`<div class="detail-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="detail-section-title" style="margin:0">✅ 체크리스트</div>
        <span style="font-size:12px;color:var(--text3);font-weight:700">${doneCount}/${totalCount}</span>
      </div>
      <div style="height:4px;background:var(--bg);border-radius:100px;margin-bottom:12px;overflow:hidden">
        <div style="height:100%;background:#30D158;width:${totalCount?Math.round(doneCount/totalCount*100):0}%;border-radius:100px;transition:width .3s"></div>
      </div>`;
    (s.checklist||[]).forEach(c=>{
      html+=`<div class="check-item${c.done?' checked':''}" onclick="toggleCheck('${s.id}','${c.id}')">
        <input type="checkbox" ${c.done?'checked':''} onclick="toggleCheck('${s.id}','${c.id}')"/>
        <span>${c.text}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  // 틱톡 음원
  if(s.tiktokSound){
    html+=`<div class="detail-section">
      <div class="detail-section-title">🎵 틱톡 음원</div>
      <div style="font-size:14px;color:var(--text2);word-break:break-all">${s.tiktokSound}</div>
    </div>`;
  }

  // 메모
  if(s.notes){
    html+=`<div class="detail-section">
      <div class="detail-section-title">💬 메모</div>
      <div style="font-size:14px;line-height:1.7;color:var(--text2)">${s.notes}</div>
    </div>`;
  }

  // 삭제
  html+=`<div style="padding:0 0 20px">
    <button class="btn-danger" onclick="confirmDelete('${s.id}')">🗑 스케줄 삭제</button>
  </div>`;

  document.getElementById('detailContent').innerHTML=html;
}

function findExampleNote(keyword){
  if(!keyword)return null;
  if(keyword.includes(' > ')){
    const[gkw,sn]=keyword.split(' > ');
    const g=state.templates.find(t=>t.subs&&t.keyword===gkw);
    return g?.subs?.find(s=>s.name===sn)?.exampleNote||null;
  }
  return state.templates.find(t=>!t.subs&&t.keyword===keyword)?.exampleNote||null;
}

function copyCaption(id){
  const s=state.schedules.find(x=>x.id===id);
  if(!s?.caption)return;
  navigator.clipboard.writeText(s.caption).then(()=>{
    const btn=document.getElementById('copyBtn');
    if(btn){btn.textContent='✅ 복사 완료!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 전체 복사';btn.classList.remove('copied')},1800);}
    showToast('📋 복사되었습니다');
  });
}

function copyCaptionInput(){
  const v=document.getElementById('f-caption')?.value;
  if(v)navigator.clipboard.writeText(v).then(()=>showToast('📋 복사됨'));
}

function toggleDone(id,e){
  e.stopPropagation();
  const s=state.schedules.find(x=>x.id===id);
  if(!s)return;
  s.status=s.status==='done'?'pending':'done';
  save();renderDashboard();renderSchedules();
  if(state.currentPage==='detail')renderDetail();
}

function toggleSubDone(parentId,subId,e){
  e.stopPropagation();
  const s=state.schedules.find(x=>x.id===parentId);
  if(!s)return;
  const sub=(s.subs||[]).find(x=>x.id===subId);
  if(!sub)return;
  sub.status=sub.status==='done'?'pending':'done';
  save();renderDashboard();renderSchedules();
  if(state.currentPage==='detail')renderDetail();
}

function toggleCheck(schedId,checkId){
  const s=state.schedules.find(x=>x.id===schedId);
  if(!s)return;
  const c=(s.checklist||[]).find(x=>x.id===checkId);
  if(!c)return;
  c.done=!c.done;
  save();renderDetail();
}

function confirmDelete(id){
  if(confirm('정말 삭제할까요?')){
    state.schedules=state.schedules.filter(s=>s.id!==id);
    save();showToast('🗑 삭제되었습니다');
    goPage('schedules',document.getElementById('nav-schedules'));
  }
}

// ── 스케줄 추가/수정 모달 ─────────────────────────────────
function openAddModal(){
  try{
  state.editId=null;
  document.getElementById('modalTitle').textContent='스케줄 추가';
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('f-title').value='';
  document.getElementById('f-date').value=today;
  document.getElementById('f-time-h').value='';document.getElementById('f-time-m').value='';
  document.getElementById('f-caption').value='';
  document.getElementById('f-notes').value='';
  state.selectedPlatforms=[];
  state.selectedStatus='pending';
  state.checklist=[];
  renderArtistSelect();
  renderPlatformPills();
  renderKeywordGroups('','','');
  renderChecklistForm();
  document.getElementById('exampleNoteBox').style.display='none';
  updateTiktokBox();
  document.getElementById('f-tiktok-sound').value='';
  document.getElementById('addModal').classList.add('show');
  setTimeout(()=>{const m=document.querySelector('#addModal .modal');if(m)m.scrollTop=0;},50);
  }catch(e){alert('오류: '+e.message);}
}

function openEditModal(id){
  const s=state.schedules.find(x=>x.id===id);
  if(!s)return;
  state.editId=id;
  document.getElementById('modalTitle').textContent='스케줄 수정';
  document.getElementById('f-title').value=s.title||'';
  document.getElementById('f-date').value=s.date||'';
  if(s.time){const[hh,mm]=s.time.split(':');document.getElementById('f-time-h').value=parseInt(hh)||'';document.getElementById('f-time-m').value=parseInt(mm)||'';}else{document.getElementById('f-time-h').value='';document.getElementById('f-time-m').value='';}
  document.getElementById('f-caption').value=s.caption||'';
  document.getElementById('f-notes').value=s.notes||'';
  state.selectedPlatforms=[...(s.platforms||[])];
  state.selectedStatus=s.status||'pending';
  state.checklist=(s.checklist||[]).map(c=>({...c}));
  renderArtistSelect(s.artistId);
  renderPlatformPills();
  renderKeywordGroups(s.keyword||'',s.caption||'',s.platforms||[]);
  renderChecklistForm();
  setStatus(s.status||'pending');
  const ex=findExampleNote(s.keyword);
  if(ex){document.getElementById('exampleNoteBox').style.display='block';document.getElementById('f-exampleNote').textContent=ex;}
  else document.getElementById('exampleNoteBox').style.display='none';
  updateTiktokBox();
  document.getElementById('f-tiktok-sound').value=s.tiktokSound||'';
  document.getElementById('addModal').classList.add('show');
  setTimeout(()=>{const m=document.querySelector('#addModal .modal');if(m)m.scrollTop=0;},50);
  }catch(e){alert('오류: '+e.message);}
}

function closeAddModal(){document.getElementById('addModal').classList.remove('show');}

function renderArtistSelect(selectedId=''){
  const sel=document.getElementById('f-artist');
  sel.innerHTML='<option value="">선택 안 함</option>';
  state.artists.forEach(a=>{
    const o=document.createElement('option');
    o.value=a.id;o.textContent=`${a.emoji} ${a.name}`;
    if(a.id===selectedId)o.selected=true;
    sel.appendChild(o);
  });
}

function renderPlatformPills(){
  document.getElementById('f-platforms').innerHTML=PLATFORMS.map(p=>`
    <button class="plat-pill${state.selectedPlatforms.includes(p)?' sel-'+PLATKEY(p):''}" onclick="togglePlatform('${p}')">${p}</button>
  `).join('');
}

function togglePlatform(p){
  if(state.selectedPlatforms.includes(p))state.selectedPlatforms=state.selectedPlatforms.filter(x=>x!==p);
  else state.selectedPlatforms.push(p);
  renderPlatformPills();
  updateTiktokBox();
}

function renderKeywordGroups(selectedKw,caption,platforms){
  const groups=state.templates.filter(t=>t.subs);
  const flat=state.templates.filter(t=>!t.subs);
  let html='';
  groups.forEach(g=>{
    const isOpen=state.expandedKwGroups[g.id];
    html+=`<div class="kw-group">
      <div class="kw-group-hdr" onclick="toggleKwGroup('${g.id}')">
        <span>📁 ${g.keyword}</span><span>${isOpen?'▼':'▶'}</span>
      </div>`;
    if(isOpen){
      html+=`<div class="kw-subs">`;
      (g.subs||[]).forEach(sub=>{
        const fullKw=g.keyword+' > '+sub.name;
        html+=`<div class="kw-sub-item${selectedKw===fullKw?' selected':''}" onclick="applyKwSub('${g.id}','${sub.id}')">
          <span style="color:var(--text3)">└</span>${sub.name}
          ${sub.scheduleType?`<span class="badge b-type">${sub.scheduleType}</span>`:''}
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  if(flat.length>0){
    html+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">`;
    flat.forEach(t=>{
      html+=`<button onclick="applyFlatKw('${t.id}')" style="padding:7px 12px;border-radius:100px;font-size:12px;font-weight:600;border:1.5px solid ${selectedKw===t.keyword?'#5E35B1':'var(--border)'};background:${selectedKw===t.keyword?'#EDE7F6':'var(--surface)'};color:${selectedKw===t.keyword?'#5E35B1':'var(--text2)'};cursor:pointer;font-family:inherit">${t.keyword}</button>`;
    });
    html+=`</div>`;
  }
  document.getElementById('f-keywords').innerHTML=html;
}

function toggleKwGroup(gid){
  state.expandedKwGroups[gid]=!state.expandedKwGroups[gid];
  renderKeywordGroups(document.getElementById('f-keywords').dataset.kw||'','','');
}

function applyKwSub(gid,sid){
  const g=state.templates.find(t=>t.id===gid);
  if(!g)return;
  const sub=(g.subs||[]).find(s=>s.id===sid);
  if(!sub)return;
  const fullKw=g.keyword+' > '+sub.name;
  document.getElementById('f-keywords').dataset.kw=fullKw;
  if(sub.caption)document.getElementById('f-caption').value=sub.caption;
  if(sub.platforms?.length)state.selectedPlatforms=[...sub.platforms];
  if(sub.checklist?.length)state.checklist=sub.checklist.map(c=>({id:uid(),text:c,done:false}));
  if(sub.exampleNote){document.getElementById('exampleNoteBox').style.display='block';document.getElementById('f-exampleNote').textContent=sub.exampleNote;}
  else document.getElementById('exampleNoteBox').style.display='none';
  renderPlatformPills();renderChecklistForm();
  renderKeywordGroups(fullKw,'','');
}

function applyFlatKw(tid){
  const t=state.templates.find(x=>x.id===tid);
  if(!t)return;
  document.getElementById('f-keywords').dataset.kw=t.keyword;
  if(t.caption)document.getElementById('f-caption').value=t.caption;
  if(t.platforms?.length)state.selectedPlatforms=[...t.platforms];
  if(t.checklist?.length)state.checklist=t.checklist.map(c=>({id:uid(),text:c,done:false}));
  if(t.exampleNote){document.getElementById('exampleNoteBox').style.display='block';document.getElementById('f-exampleNote').textContent=t.exampleNote;}
  else document.getElementById('exampleNoteBox').style.display='none';
  renderPlatformPills();renderChecklistForm();
  renderKeywordGroups(t.keyword,'','');
}

function renderChecklistForm(){
  document.getElementById('f-checklist').innerHTML=state.checklist.map((c,i)=>`
    <div class="check-item">
      <input type="checkbox" ${c.done?'checked':''} onchange="state.checklist[${i}].done=this.checked"/>
      <span>${c.text}</span>
      <span class="del-check" onclick="state.checklist.splice(${i},1);renderChecklistForm()">✕</span>
    </div>
  `).join('');
}

function addCheckItem(){
  const v=document.getElementById('f-check-input').value.trim();
  if(!v)return;
  state.checklist.push({id:uid(),text:v,done:false});
  document.getElementById('f-check-input').value='';
  renderChecklistForm();
}

function setStatus(s){
  state.selectedStatus=s;
  const ep=document.getElementById('status-pending');
  const ed=document.getElementById('status-done');
  if(ep)ep.className='plat-pill'+(s==='pending'?' sel-pending':'');
  if(ed)ed.className='plat-pill'+(s==='done'?' sel-done':'');
}

function saveSchedule(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  if(!title){showToast('제목을 입력해주세요');return;}
  if(!date){showToast('날짜를 선택해주세요');return;}
  const keyword=document.getElementById('f-keywords').dataset.kw||'';
  const data={
    id:state.editId||uid(),
    title,date,
    time:(()=>{const h=document.getElementById('f-time-h').value;const m=document.getElementById('f-time-m').value;return h!==''&&m!==''?String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'):'';})(),
    keyword,
    platforms:state.selectedPlatforms,
    caption:document.getElementById('f-caption').value,
    notes:document.getElementById('f-notes').value,
    artistId:document.getElementById('f-artist').value,
    status:state.selectedStatus,
    checklist:state.checklist,
    tiktokSound:document.getElementById('f-tiktok-sound')?.value||'',
    subs:state.editId?state.schedules.find(s=>s.id===state.editId)?.subs||[]:[]
  };
  if(state.editId){
    state.schedules=state.schedules.map(s=>s.id===state.editId?data:s);
    showToast('✅ 수정되었습니다');
  } else {
    state.schedules.push(data);
    showToast('✅ 추가되었습니다');
  }
  save();scheduleAllNotifications();
  closeAddModal();renderDashboard();renderSchedules();
  if(state.currentPage==='detail')renderDetail();
}

// ── 하위 스케줄 모달 ──────────────────────────────────────
function openSubModal(parentId,subId,e){
  if(e)e.stopPropagation();
  state.subParentId=parentId;
  state.subEditId=subId;
  const parent=state.schedules.find(s=>s.id===parentId);
  const sub=subId?(parent?.subs||[]).find(s=>s.id===subId):null;
  document.getElementById('subModalTitle').textContent=subId?'하위 스케줄 수정':'하위 스케줄 추가';
  document.getElementById('sf-title').value=sub?.title||'';
  if(sub?.time){const[hh,mm]=sub.time.split(':');document.getElementById('sf-time-h').value=parseInt(hh)||'';document.getElementById('sf-time-m').value=parseInt(mm)||'';}else{document.getElementById('sf-time-h').value='';document.getElementById('sf-time-m').value='';}
  document.getElementById('sf-notes').value=sub?.notes||'';
  document.getElementById('subModal').classList.add('show');
}

function closeSubModal(){document.getElementById('subModal').classList.remove('show');}

function saveSubSchedule(){
  const title=document.getElementById('sf-title').value.trim();
  if(!title){showToast('제목을 입력해주세요');return;}
  const parent=state.schedules.find(s=>s.id===state.subParentId);
  if(!parent)return;
  if(!parent.subs)parent.subs=[];
  const data={id:state.subEditId||uid(),title,time:(()=>{const h=document.getElementById('sf-time-h').value;const m=document.getElementById('sf-time-m').value;return h!==''&&m!==''?String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'):'';})(),notes:document.getElementById('sf-notes').value,status:'pending'};
  if(state.subEditId){
    parent.subs=parent.subs.map(s=>s.id===state.subEditId?data:s);
  } else {
    parent.subs.push(data);
  }
  save();scheduleAllNotifications();
  closeSubModal();renderDashboard();renderSchedules();
  if(state.currentPage==='detail')renderDetail();
  showToast('✅ 하위 스케줄 저장됨');
}

// ── 템플릿 ────────────────────────────────────────────────
function renderTemplates(){
  const q=(document.getElementById('tplSearch')?.value||'').toLowerCase();
  const groups=state.templates.filter(t=>t.subs&&(!q||t.keyword.toLowerCase().includes(q)||(t.subs||[]).some(s=>s.name.toLowerCase().includes(q))));
  const flat=state.templates.filter(t=>!t.subs&&(!q||t.keyword.toLowerCase().includes(q)));
  let html=`<button onclick="openTplGroupModal()" style="width:100%;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:14px">+ 키워드 그룹 추가</button>`;
  groups.forEach(g=>{
    html+=`<div class="tpl-group">
      <div class="tpl-group-hdr">
        <h4>📁 ${g.keyword}</h4>
        <div class="tpl-hdr-right">
          <span style="font-size:12px;color:var(--text3)">${(g.subs||[]).length}개</span>
          <button class="tpl-btn tpl-btn-edit" onclick="openTplGroupModal('${g.id}')">수정</button>
          <button class="tpl-btn tpl-btn-del" onclick="deleteTplGroup('${g.id}')">삭제</button>
        </div>
      </div>
      ${(g.subs||[]).map(sub=>`
        <div class="tpl-sub">
          <div>
            <div class="tpl-sub-name">${sub.name}</div>
            ${sub.scheduleType?`<span class="badge b-type" style="margin-top:4px">${sub.scheduleType}</span>`:''}
          </div>
          <div class="tpl-actions">
            <button class="tpl-btn tpl-btn-edit" onclick="openTplSubModal('${g.id}','${sub.id}')">수정</button>
            <button class="tpl-btn tpl-btn-del" onclick="deleteTplSub('${g.id}','${sub.id}')">삭제</button>
          </div>
        </div>
      `).join('')}
      <div class="tpl-add-sub" onclick="openTplSubModal('${g.id}')">+ 항목 추가</div>
    </div>`;
  });
  flat.forEach(t=>{
    html+=`<div class="tpl-group">
      <div class="tpl-group-hdr">
        <h4>🏷 ${t.keyword}</h4>
        <div class="tpl-hdr-right">
          <button class="tpl-btn tpl-btn-del" onclick="deleteFlatTpl('${t.id}')">삭제</button>
        </div>
      </div>
    </div>`;
  });
  if(!groups.length&&!flat.length)html+=`<div class="empty"><div class="empty-icon">🏷</div><p>템플릿이 없어요</p></div>`;
  document.getElementById('tplContent').innerHTML=html;
}

function openTplGroupModal(gid){
  const g=gid?state.templates.find(t=>t.id===gid):null;
  state.tplEditGroup=gid||null;
  state.tplEditSub=null;
  document.getElementById('tplModalTitle').textContent=gid?'키워드 수정':'새 키워드 그룹';
  document.getElementById('tplModalBody').innerHTML=`
    <div class="form-group">
      <label class="form-label">키워드 이름 *</label>
      <input class="form-input" id="tf-keyword" placeholder="예: 음악방송" value="${g?.keyword||''}"/>
    </div>`;
  document.getElementById('tplModal').classList.add('show');
}

function openTplSubModal(gid,sid){
  const g=state.templates.find(t=>t.id===gid);
  const sub=sid?(g?.subs||[]).find(s=>s.id===sid):null;
  state.tplEditGroup=gid;state.tplEditSub=sid||null;
  document.getElementById('tplModalTitle').textContent=sid?'항목 수정':'새 항목';
  document.getElementById('tplModalBody').innerHTML=`
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">📁 ${g?.keyword}</div>
    <div class="form-group"><label class="form-label">항목 이름 *</label><input class="form-input" id="tf-name" placeholder="예: 방송고지 안내 (개인)" value="${sub?.name||''}"/></div>
    <div class="form-group"><label class="form-label">유형 (스케줄 카드 표시)</label><input class="form-input" id="tf-type" placeholder="예: 음악방송" value="${sub?.scheduleType||''}"/></div>
    <div class="form-group"><label class="form-label">📝 참고 예시글</label><textarea class="form-textarea" id="tf-example" placeholder="작성 참고용...">${sub?.exampleNote||''}</textarea></div>
    <div class="form-group"><label class="form-label">기본 멘트</label><textarea class="form-textarea" id="tf-caption" style="min-height:80px">${sub?.caption||''}</textarea></div>
    <div class="form-group"><label class="form-label">기본 플랫폼</label><div class="platform-row" id="tf-platforms">${PLATFORMS.map(p=>`<button class="plat-pill${(sub?.platforms||[]).includes(p)?' sel-'+PLATKEY(p):''}" onclick="this.className='plat-pill sel-'+{'트위터':'twitter',인스타그램:'instagram',유튜브:'youtube',틱톡:'tiktok',베리즈:'weverse',웨이보:'weibo'}['${p}']">${p}</button>`).join('')}</div></div>`;
  document.getElementById('tplModal').classList.add('show');
}

function closeTplModal(){document.getElementById('tplModal').classList.remove('show');}

function saveTplItem(){
  if(state.tplEditSub!==undefined&&state.tplEditGroup&&document.getElementById('tf-name')){
    // sub
    const name=document.getElementById('tf-name').value.trim();
    if(!name){showToast('이름을 입력해주세요');return;}
    const g=state.templates.find(t=>t.id===state.tplEditGroup);
    if(!g)return;
    if(!g.subs)g.subs=[];
    const plats=[...document.querySelectorAll('#tf-platforms .plat-pill')].filter(b=>b.className.includes('sel-')).map(b=>b.textContent.trim());
    const data={id:state.tplEditSub||uid(),name,scheduleType:document.getElementById('tf-type')?.value||'',exampleNote:document.getElementById('tf-example')?.value||'',caption:document.getElementById('tf-caption')?.value||'',platforms:plats,checklist:[]};
    if(state.tplEditSub){g.subs=g.subs.map(s=>s.id===state.tplEditSub?data:s);}
    else{g.subs.push(data);}
  } else if(document.getElementById('tf-keyword')){
    // group
    const kw=document.getElementById('tf-keyword').value.trim();
    if(!kw){showToast('키워드를 입력해주세요');return;}
    if(state.tplEditGroup){state.templates=state.templates.map(t=>t.id===state.tplEditGroup?{...t,keyword:kw}:t);}
    else{state.templates.push({id:uid(),keyword:kw,subs:[]});}
  }
  save();closeTplModal();renderTemplates();showToast('✅ 저장되었습니다');
}

function deleteTplGroup(gid){if(confirm('키워드 그룹을 삭제할까요?')){state.templates=state.templates.filter(t=>t.id!==gid);save();renderTemplates();showToast('🗑 삭제됨');}}
function deleteTplSub(gid,sid){const g=state.templates.find(t=>t.id===gid);if(g){g.subs=(g.subs||[]).filter(s=>s.id!==sid);save();renderTemplates();showToast('🗑 삭제됨');}}
function deleteFlatTpl(id){if(confirm('삭제할까요?')){state.templates=state.templates.filter(t=>t.id!==id);save();renderTemplates();showToast('🗑 삭제됨');}}

// ── 아티스트 ──────────────────────────────────────────────
function renderArtists(){
  let html=`<button onclick="openArtistModal()" style="width:100%;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:14px">+ 아티스트 추가</button>`;
  state.artists.forEach(a=>{
    html+=`<div class="artist-card" style="border-left:4px solid ${a.color}">
      <div class="artist-emoji-circle" style="background:${a.color}20">${a.emoji}</div>
      <div class="artist-info">
        <div class="artist-name">${a.name}<span class="artist-color-swatch" style="background:${a.color}"></span></div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="tpl-btn tpl-btn-edit" onclick="openArtistModal('${a.id}')">수정</button>
        <button class="tpl-btn tpl-btn-del" onclick="deleteArtist('${a.id}')">삭제</button>
      </div>
    </div>`;
  });
  document.getElementById('artistContent').innerHTML=html;
}

let afEmoji='🌸',afColor='#FF2D55';
function openArtistModal(aid){
  const a=aid?state.artists.find(x=>x.id===aid):null;
  state.artistEdit=aid||null;
  afEmoji=a?.emoji||'🌸';afColor=a?.color||'#FF2D55';
  document.getElementById('artistModalTitle').textContent=aid?'아티스트 수정':'새 아티스트';
  document.getElementById('af-name').value=a?.name||'';
  document.getElementById('af-emojis').innerHTML=EMOJIS.map(e=>`<span onclick="afEmoji='${e}';document.querySelectorAll('#af-emojis span').forEach(x=>x.style.outline='none');this.style.outline='3px solid var(--red)'" style="font-size:24px;cursor:pointer;padding:4px;border-radius:8px;outline:${afEmoji===e?'3px solid var(--red)':'none'}">${e}</span>`).join('');
  document.getElementById('af-colors').innerHTML=COLORS.map(c=>`<div onclick="afColor='${c}';document.getElementById('af-colorpicker').value='${c}';document.querySelectorAll('#af-colors div').forEach(x=>x.style.transform='scale(1)');this.style.transform='scale(1.3)'" style="width:32px;height:32px;background:${c};border-radius:8px;cursor:pointer;transition:transform .1s;transform:${afColor===c?'scale(1.3)':'scale(1)'};border:${afColor===c?'3px solid #333':'none'}"></div>`).join('');
  document.getElementById('af-colorpicker').value=afColor;
  document.getElementById('af-colorpicker').oninput=function(){afColor=this.value;};
  document.getElementById('artistModal').classList.add('show');
}

function closeArtistModal(){document.getElementById('artistModal').classList.remove('show');}

function saveArtist(){
  const name=document.getElementById('af-name').value.trim();
  if(!name){showToast('이름을 입력해주세요');return;}
  const sel=document.querySelector('#af-emojis span[style*="outline: 3px"]')||document.querySelector('#af-emojis span');
  if(sel)afEmoji=sel.textContent;
  const data={id:state.artistEdit||uid(),name,emoji:afEmoji,color:document.getElementById('af-colorpicker').value||afColor};
  if(state.artistEdit){state.artists=state.artists.map(a=>a.id===state.artistEdit?data:a);}
  else{state.artists.push(data);}
  save();closeArtistModal();renderArtists();showToast('✅ 저장되었습니다');
}

function deleteArtist(id){if(confirm('삭제할까요?')){state.artists=state.artists.filter(a=>a.id!==id);save();renderArtists();showToast('🗑 삭제됨');}}

// ── 토스트 ────────────────────────────────────────────────
function showToast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

// ── 시간 입력 포맷 (24시간) ──────────────────────────────
function formatTimeInput(el){
  let v=el.value.replace(/[^0-9]/g,'');
  if(v.length>=3)v=v.slice(0,2)+':'+v.slice(2,4);
  el.value=v;
}

// ── 틱톡 음원 토글 ──────────────────────────────────────
function updateTiktokBox() {
  const hasTiktok = state.selectedPlatforms.includes('틱톡');
  const box = document.getElementById('tiktokSoundBox');
  if (box) box.style.display = hasTiktok ? 'block' : 'none';
}

// ── PWA 서비스워커 ─────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
